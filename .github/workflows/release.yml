name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed by git-cliff to read full commit history

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Build Chrome ZIP
        run: |
          mkdir -p dist/chrome
          cp background.js content.js style.css browser-polyfill.min.js \
             icon.png icon48.png icon16.png dist/chrome/
          jq 'del(.browser_specific_settings, .data_collection_permissions)
              | .background = {"service_worker": .background.service_worker}
              | .version = "${{ steps.version.outputs.VERSION }}"' \
            manifest.json > dist/chrome/manifest.json
          cd dist/chrome
          zip -r ../../wfm-price-history-chrome-${{ steps.version.outputs.VERSION }}.zip .

      - name: Build Firefox ZIP
        run: |
          mkdir -p dist/firefox
          cp background.js content.js style.css browser-polyfill.min.js \
             icon.png icon48.png icon16.png dist/firefox/
          jq '.version = "${{ steps.version.outputs.VERSION }}"' \
            manifest.json > dist/firefox/manifest.json
          cd dist/firefox
          zip -r ../../wfm-price-history-firefox-${{ steps.version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.cliff.outputs.content }}
          files: |
            wfm-price-history-chrome-${{ steps.version.outputs.VERSION }}.zip
            wfm-price-history-firefox-${{ steps.version.outputs.VERSION }}.zip

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          NOTES: ${{ steps.cliff.outputs.content }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          BODY=$(printf '%s' "$NOTES" | head -c 3800 | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -sSf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"WFM Price History v${VERSION} released\",
                \"description\": ${BODY},
                \"color\": 15548997,
                \"url\": \"https://github.com/${{ github.repository }}/releases/tag/v${VERSION}\"
              }]
            }"
