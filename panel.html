<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WFM Tracker — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="panel.css">
</head>
<body id="wfm-panel-body">

  <div id="wfm-panel-root">

    <header class="wfm-panel-header">
      <div class="wfm-panel-logo">
        <svg class="wfm-panel-logo-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <polyline points="2,14 7,8 11,11 18,4"/>
          <line x1="2" y1="18" x2="18" y2="18"/>
        </svg>
        <span class="wfm-panel-logo-text">WFM Tracker</span>
      </div>

      <div class="wfm-panel-nav-btns">
        <button id="wfm-nav-back" class="wfm-panel-nav-btn" disabled title="Back">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="10,3 5,8 10,13"/>
          </svg>
        </button>
        <button id="wfm-nav-fwd" class="wfm-panel-nav-btn" disabled title="Forward">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6,3 11,8 6,13"/>
          </svg>
        </button>
      </div>

      <div id="wfm-panel-search-wrap" class="wfm-panel-search-wrap">
        <svg class="wfm-panel-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="6.5" cy="6.5" r="4.5"/>
          <line x1="10" y1="10" x2="14" y2="14"/>
        </svg>
        <input id="wfm-panel-search" class="wfm-panel-search" type="text"
          placeholder="Search items… (press Enter)" autocomplete="off" spellcheck="false">
      </div>

      <div class="wfm-panel-header-right">
        <a class="wfm-panel-header-link" href="https://discord.gg/fAaYwXcB4" target="_blank" rel="noopener">Send Feedback</a>
        <a class="wfm-panel-header-link" href="https://github.com/FireZenk/WFMTacker/issues" target="_blank" rel="noopener">Report on GitHub</a>
        <button class="wfm-panel-settings-btn" id="wfm-panel-open-settings" title="Settings">
          <svg viewBox="0 0 16 16" fill="currentColor" stroke="none">
            <path d="M6.5 1l-.35 1.3a4.8 4.8 0 00-1.08.45L3.8 2.1 2.1 3.8l.65 1.27a4.8 4.8 0 00-.45 1.08L1 6.5v3l1.3.35c.12.38.27.74.45 1.08L2.1 12.2l1.7 1.7 1.27-.65c.34.18.7.33 1.08.45L6.5 15h3l.35-1.3c.38-.12.74-.27 1.08-.45l1.27.65 1.7-1.7-.65-1.27c.18-.34.33-.7.45-1.08L15 9.5v-3l-1.3-.35a4.8 4.8 0 00-.45-1.08l.65-1.27-1.7-1.7-1.27.65a4.8 4.8 0 00-1.08-.45L9.5 1H6.5zm1.5 4a3 3 0 110 6 3 3 0 010-6zm0 1.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="wfm-panel-layout">

      <aside id="wfm-panel-sidebar" class="wfm-panel-sidebar">
        <div class="wfm-panel-sidebar-tabs">
          <button class="wfm-panel-sidebar-tab active" id="wfm-tab-watchlist">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <polygon points="8,2 10,6 14,6.5 11,9.5 11.8,14 8,11.8 4.2,14 5,9.5 2,6.5 6,6"/>
            </svg>
            Watchlist
            <span id="wfm-panel-wl-count" class="wfm-panel-wl-count">0</span>
          </button>
          <button class="wfm-panel-sidebar-tab" id="wfm-tab-alerts">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M8 2a5 5 0 00-5 5c0 2.5-.8 3.5-1.5 4h13c-.7-.5-1.5-1.5-1.5-4a5 5 0 00-5-5z"/>
              <line x1="8" y1="14" x2="8" y2="15"/>
              <line x1="6.5" y1="14.5" x2="9.5" y2="14.5"/>
            </svg>
            Alerts
            <span id="wfm-panel-alert-count" class="wfm-panel-wl-count" style="display:none">0</span>
          </button>
        </div>
        <div id="wfm-panel-wl-body" class="wfm-panel-wl-body">
          <div class="wfm-panel-wl-empty">Loading…</div>
        </div>
        <div class="wfm-panel-sidebar-footer">
          <button id="wfm-panel-wl-refresh" class="wfm-panel-wl-refresh" style="display:none">↻ Refresh prices</button>
          <button id="wfm-panel-wl-export" class="wfm-panel-wl-export" style="display:none" data-tooltip="Export watchlist as CSV">↓ Export</button>
          <button id="wfm-panel-wl-import" class="wfm-panel-wl-export" data-tooltip="Import watchlist from CSV (overwrites matching items)">↑ Import</button>
          <button id="wfm-panel-wl-select" class="wfm-panel-wl-select" style="display:none">Select</button>
          <input id="wfm-panel-wl-import-file" type="file" accept=".csv,text/csv" hidden>
        </div>
        <div id="wfm-panel-select-bar" class="wfm-panel-select-bar" style="display:none">
          <button id="wfm-panel-select-all" class="wfm-panel-select-all">All</button>
          <button id="wfm-panel-remove-selected" class="wfm-panel-remove-selected" disabled>Remove (0)</button>
          <button id="wfm-panel-select-cancel" class="wfm-panel-select-cancel">Cancel</button>
        </div>

        <div id="wfm-panel-recent-section" class="wfm-panel-recent-section" style="display:none">
          <div class="wfm-panel-recent-header">Recent</div>
          <div id="wfm-panel-recent-body" class="wfm-panel-recent-body"></div>
        </div>
      </aside>

      <main id="wfm-panel-content" class="wfm-panel-content">
        <div class="wfm-panel-empty-state" id="wfm-panel-empty">
          <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="6,46 20,28 32,36 50,14"/>
            <line x1="6" y1="56" x2="58" y2="56"/>
          </svg>
          <p>Search for an item to view its price history and market insights.</p>
        </div>
      </main>

    </div>

    <footer class="wfm-panel-footer">
      <span class="wfm-panel-footer-donate" data-tooltip="Send gift Forma to OptimusRex007">Donate</span>
      <a class="wfm-panel-footer-link" href="https://discord.gg/fAaYwXcB4" target="_blank" rel="noopener">Send Feedback</a>
      <a class="wfm-panel-footer-link" href="https://github.com/FireZenk/WFMTacker/issues" target="_blank" rel="noopener">Report on GitHub</a>
      <a class="wfm-panel-footer-copy" href="https://linktr.ee/optrx" target="_blank" rel="noopener" id="wfm-panel-copyright"></a>
    </footer>

  </div>

  <script src="browser-polyfill.min.js"></script>
  <script src="rank-utils.js"></script>
  <script src="shared.js"></script>
  <script src="panel.js"></script>
</body>
</html>
